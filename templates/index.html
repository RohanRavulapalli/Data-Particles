<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocChat</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #17171a;
      --surface2: #1e1e22;
      --border: #2a2a30;
      --accent: #6ee7b7;
      --accent-dim: #2d6b55;
      --text: #e8e8ed;
      --text-muted: #7a7a88;
      --text-dim: #4a4a58;
      --user-bubble: #1a2e26;
      --ai-bubble: #1a1a20;
      --danger: #f87171;
      --radius: 10px;
      --sans: 'IBM Plex Sans', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

    .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text-muted); font-weight: 400; }

    .sidebar-section { padding: 16px 20px 8px; }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface2);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: #1a2e26;
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      display: block;
      margin-bottom: 4px;
    }
    .upload-sub { font-size: 11px; color: var(--text-dim); }

    .upload-progress {
      display: none;
      margin-top: 10px;
      background: var(--surface2);
      border-radius: 4px;
      height: 3px;
      overflow: hidden;
    }
    .upload-progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
    }

    .doc-list { flex: 1; overflow-y: auto; padding: 8px 12px; }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .doc-item:hover { background: var(--surface2); }
    .doc-item.active {
      background: var(--user-bubble);
      border-color: var(--accent-dim);
    }

    .doc-type {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .doc-item.active .doc-type {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    .doc-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doc-delete {
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 12px;
      padding: 3px 5px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
      font-family: var(--sans);
    }
    .doc-item:hover .doc-delete { opacity: 1; }
    .doc-delete:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

    .no-docs { padding: 12px 10px; font-size: 12px; color: var(--text-dim); text-align: center; }

    /* Main */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .active-doc-info { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .active-doc-name { font-family: var(--mono); font-size: 13px; color: var(--accent); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    .status-dot.on { background: var(--accent); box-shadow: 0 0 5px var(--accent); }

    .clear-btn {
      font-size: 11px;
      padding: 5px 12px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* Chat */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      text-align: center;
    }
    .empty-state h2 { font-size: 16px; font-weight: 500; color: var(--text-muted); }
    .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.6; }

    .message { display: flex; gap: 12px; max-width: 800px; animation: fadein 0.2s ease; }
    @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai { align-self: flex-start; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.user .avatar { background: var(--accent-dim); color: var(--accent); }
    .message.ai .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      max-width: 640px;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--accent-dim);
      border-bottom-right-radius: 3px;
    }
    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    /* Markdown rendering inside AI bubbles */
    .message.ai .bubble h1,
    .message.ai .bubble h2,
    .message.ai .bubble h3 {
      font-size: 14px;
      font-weight: 600;
      margin: 10px 0 4px;
      color: var(--text);
    }
    .message.ai .bubble p { margin: 6px 0; }
    .message.ai .bubble ul,
    .message.ai .bubble ol {
      padding-left: 18px;
      margin: 6px 0;
    }
    .message.ai .bubble li { margin: 3px 0; }
    .message.ai .bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .message.ai .bubble pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.ai .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
    }
    .message.ai .bubble strong { font-weight: 600; color: var(--text); }
    .message.ai .bubble em { font-style: italic; color: var(--text-muted); }
    .message.ai .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }
    .message.ai .bubble blockquote {
      border-left: 3px solid var(--accent-dim);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 6px 0;
    }

    .thinking { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
    .thinking span {
      width: 5px; height: 5px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* Input */
    .input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent-dim); }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      resize: none;
      min-height: 22px;
      max-height: 160px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
      font-size: 15px;
      color: #0f0f11;
      font-weight: 700;
    }
    .send-btn:hover { background: #86efac; }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .input-hint { font-size: 11px; color: var(--text-dim); margin-top: 7px; text-align: center; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(60px);
      opacity: 0;
      transition: all 0.25s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #1a2e26; border: 1px solid var(--accent-dim); color: var(--accent); }
    .toast.error { background: #2e1a1a; border: 1px solid #7f2020; color: var(--danger); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">doc<span>chat</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Upload</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf,.docx" />
        <span class="upload-label">Click to upload or drag and drop</span>
        <span class="upload-sub">PDF or DOCX</span>
      </div>
      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="uploadProgressBar"></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Documents</div>
    </div>
    <div class="doc-list" id="docList">
      <div class="no-docs">No documents uploaded yet</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="active-doc-info">
        <div class="status-dot" id="statusDot"></div>
        <span>Active:</span>
        <span class="active-doc-name" id="activeDocName">none</span>
      </div>
      <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <h2>No document selected</h2>
        <p>Upload a PDF or DOCX file, then ask questions about it.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="queryInput"
          placeholder="Ask a question about the document..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">^</button>
      </div>
      <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  let activeDocument = null;
  let isLoading = false;

  async function init() {
    const res = await fetch("/documents");
    const data = await res.json();
    renderDocList(data.documents, data.active);
    if (data.active) setActiveDoc(data.active);
  }

  function renderDocList(docs, active) {
    const list = document.getElementById("docList");
    if (!docs.length) {
      list.innerHTML = '<div class="no-docs">No documents uploaded yet</div>';
      return;
    }
    list.innerHTML = docs.map(doc => {
      const ext = doc.split(".").pop().toUpperCase();
      return `
        <div class="doc-item ${doc === active ? 'active' : ''}" onclick="selectDoc('${doc}')">
          <span class="doc-type">${ext}</span>
          <span class="doc-name" title="${doc}">${doc}</span>
          <button class="doc-delete" onclick="deleteDoc(event, '${doc}')">x</button>
        </div>
      `;
    }).join("");
  }

  async function refreshDocs() {
    const res = await fetch("/documents");
    const data = await res.json();
    renderDocList(data.documents, activeDocument);
  }

  async function selectDoc(filename) {
    await fetch("/select", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename })
    });
    setActiveDoc(filename);
    await refreshDocs();
    clearChatUI();
    showToast(`Switched to ${filename}`, "success");
  }

  async function deleteDoc(e, filename) {
    e.stopPropagation();
    await fetch("/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ filename })
    });
    if (activeDocument === filename) {
      setActiveDoc(null);
      clearChatUI();
    }
    await refreshDocs();
    showToast(`Removed ${filename}`, "success");
  }

  function setActiveDoc(filename) {
    activeDocument = filename;
    document.getElementById("activeDocName").textContent = filename || "none";
    const dot = document.getElementById("statusDot");
    dot.className = "status-dot" + (filename ? " on" : "");
  }

  const fileInput = document.getElementById("fileInput");
  const uploadZone = document.getElementById("uploadZone");

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  });

  uploadZone.addEventListener("dragover", e => {
    e.preventDefault();
    uploadZone.classList.add("drag-over");
  });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("drag-over");
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
  });

  async function uploadFile(file) {
    const progress = document.getElementById("uploadProgress");
    const bar = document.getElementById("uploadProgressBar");
    progress.style.display = "block";
    bar.style.width = "40%";

    const formData = new FormData();
    formData.append("file", file);

    try {
      bar.style.width = "70%";
      const res = await fetch("/upload", { method: "POST", body: formData });
      bar.style.width = "100%";
      const data = await res.json();
      if (data.error) {
        showToast(data.error, "error");
      } else {
        setActiveDoc(data.filename);
        await refreshDocs();
        clearChatUI();
        showToast(data.message, "success");
      }
    } catch (err) {
      showToast("Upload failed", "error");
    } finally {
      setTimeout(() => { progress.style.display = "none"; bar.style.width = "0%"; }, 500);
      fileInput.value = "";
    }
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  async function sendMessage() {
    const input = document.getElementById("queryInput");
    const query = input.value.trim();
    if (!query || isLoading) return;

    if (!activeDocument) {
      showToast("Upload or select a document first", "error");
      return;
    }

    isLoading = true;
    document.getElementById("sendBtn").disabled = true;

    appendMessage("user", query);
    input.value = "";
    input.style.height = "auto";

    const thinkingId = "thinking-" + Date.now();
    appendThinking(thinkingId);

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, filename: activeDocument })
      });
      const data = await res.json();
      removeThinking(thinkingId);
      appendMessage("ai", data.error ? "Error: " + data.error : data.answer);
    } catch (err) {
      removeThinking(thinkingId);
      appendMessage("ai", "Connection error. Please try again.");
    } finally {
      isLoading = false;
      document.getElementById("sendBtn").disabled = false;
      input.focus();
    }
  }

  function appendMessage(role, text) {
    const chatArea = document.getElementById("chatArea");
    document.getElementById("emptyState")?.remove();

    const label = role === "user" ? "you" : "ai";
    const div = document.createElement("div");
    div.className = `message ${role}`;

    // Render markdown for AI responses, plain escaped text for user messages
    const content = role === "ai"
      ? marked.parse(text)
      : escapeHtml(text).replace(/\n/g, "<br/>");

    div.innerHTML = `
      <div class="avatar">${label}</div>
      <div class="bubble">${content}</div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendThinking(id) {
    const chatArea = document.getElementById("chatArea");
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = id;
    div.innerHTML = `
      <div class="avatar">ai</div>
      <div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeThinking(id) {
    document.getElementById(id)?.remove();
  }

  async function clearChat() {
    await fetch("/clear_chat", { method: "POST" });
    clearChatUI();
  }

  function clearChatUI() {
    document.getElementById("chatArea").innerHTML = `
      <div class="empty-state" id="emptyState">
        <h2>No document selected</h2>
        <p>Upload a PDF or DOCX file, then ask questions about it.</p>
      </div>
    `;
  }

  function showToast(msg, type) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  init();
</script>
</body>
</html>
